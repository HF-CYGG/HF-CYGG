<svg xmlns="http://www.w3.org/2000/svg" width="860" height="180" viewBox="0 0 860 180" role="img" aria-labelledby="title desc">
  <title id="title">Project Activity Pulse</title>
  <desc id="desc">An animated terminal-style project activity pulse graphic.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="45%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#243047" stroke-width="1" opacity="0.65"/>
    </pattern>
  </defs>

  <rect x="8" y="8" width="844" height="164" rx="18" fill="url(#panel)" stroke="#2f81f7" stroke-opacity="0.28"/>
  <rect x="18" y="18" width="824" height="144" rx="14" fill="url(#grid)" opacity="0.85"/>

  <g font-family="JetBrains Mono, Fira Code, Consolas, monospace">
    <text x="38" y="45" fill="#7aa2f7" font-size="16" font-weight="700">project activity pulse</text>
    <text x="38" y="72" fill="#8b949e" font-size="12">$ git log --graph --projects --quiet</text>
    <text x="38" y="95" fill="#9ece6a" font-size="12">tracked: Dawn-Course · Y-Link · LumaSR · EquipTrack · qq-emote-deck · InfraCount</text>
    <text x="38" y="118" fill="#bb9af7" font-size="12">mode: debug → refine → ship</text>
  </g>

  <g transform="translate(344 106)">
    <path d="M0,28 L58,28 L74,-12 L102,46 L132,10 L170,10 L202,-24 L236,40 L270,-2 L314,-2 L352,24 L406,24" fill="none" stroke="#1f6feb" stroke-width="10" stroke-linecap="round" opacity="0.18"/>
    <path d="M0,28 L58,28 L74,-12 L102,46 L132,10 L170,10 L202,-24 L236,40 L270,-2 L314,-2 L352,24 L406,24" fill="none" stroke="url(#pulse)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" stroke-dasharray="520" stroke-dashoffset="520">
      <animate attributeName="stroke-dashoffset" values="520;0;0" keyTimes="0;0.72;1" dur="4.2s" repeatCount="indefinite"/>
    </path>

    <g fill="#9ece6a" filter="url(#glow)">
      <circle cx="58" cy="28" r="4">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="2.1s" repeatCount="indefinite" begin="0.1s"/>
      </circle>
      <circle cx="132" cy="10" r="4">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="2.1s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
      <circle cx="202" cy="-24" r="4">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="2.1s" repeatCount="indefinite" begin="0.9s"/>
      </circle>
      <circle cx="270" cy="-2" r="4">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="2.1s" repeatCount="indefinite" begin="1.3s"/>
      </circle>
      <circle cx="352" cy="24" r="4">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="2.1s" repeatCount="indefinite" begin="1.7s"/>
      </circle>
    </g>

    <rect x="-8" y="-44" width="34" height="104" rx="10" fill="#7aa2f7" opacity="0.12">
      <animate attributeName="x" values="-8;380;-8" dur="5.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.05;0.22;0.05" dur="5.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
